# radagent/modality/registry.yaml
# Universal DICOM modality registry for RadAgent v2
# Author: Rayane Aggoune

chest_xray:
  dicom_modalities: [CR, DX]
  body_part_filters: [CHEST]
  specialist_model: convnextv2_base.fcmae_ft_in22k_in1k_384
  specialist_weights: runs/nih14_convnextv2_base_384/best.pt
  num_classes: 14
  rag_corpus: corpus/statpearls_cxr
  preprocessing: cxr_clahe_normalize
  status: production
  autonomy_tools: [triage_study, route_to_subspecialist, schedule_follow_up, flag_critical_finding]
  description: "Chest X-ray specialist - NIH-14 trained, calibrated, production-ready"

bone_xray:
  dicom_modalities: [CR, DX]
  body_part_filters: [SHOULDER, ELBOW, WRIST, HAND, FINGER, HUMERUS, FOREARM, FOOT, ANKLE, KNEE, HIP]
  specialist_model: convnextv2_tiny.fcmae_ft_in22k_in1k
  specialist_weights: weights/specialist_mura_v1.pt
  num_classes: 7
  rag_corpus: corpus/msk_guidelines
  preprocessing: bone_xray_normalize
  status: production
  autonomy_tools: [triage_study, route_to_subspecialist]
  description: "Bone X-ray specialist - MURA trained, 7 body parts"

